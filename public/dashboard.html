<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Blessing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ivory: #FDF8F0;
            --champagne: #F5E6D3;
            --beige: #E8D5C4;
            --blush: #F5D6D6;
            --warm-white: #FFF9F5;
            --gold: #C9A96E;
            --gold-light: #E8D5A3;
            --gold-dark: #B8944A;
            --text-dark: #2C1810;
            --text-gold: #A67C52;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-primary: #FDF8F0;
            --bg-secondary: #FFF9F5;
            --bg-card: #ffffff;
            --text-primary: #2C1810;
            --text-secondary: #A67C52;
            --border-color: rgba(201, 169, 110, 0.1);
            --shadow-color: rgba(0,0,0,0.08);
            --nav-bg: rgba(253, 248, 240, 0.92);
            --footer-bg: #2C1810;
            --footer-text: #FFF9F5;
            --input-bg: #FFF9F5;
            --input-border: #F5E6D3;
            --transition: all 0.4s ease;
        }

        [data-theme="dark"] {
            --ivory: #1a1410;
            --champagne: #2a1f18;
            --beige: #33261e;
            --blush: #2a1a1a;
            --warm-white: #1f1814;
            --text-dark: #f5ede8;
            --text-gold: #d4b896;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glass: rgba(30, 20, 15, 0.6);
            --glass-border: rgba(200, 180, 160, 0.15);
            --bg-primary: #1a1410;
            --bg-secondary: #1f1814;
            --bg-card: #2a1f18;
            --text-primary: #f5ede8;
            --text-secondary: #d4b896;
            --border-color: rgba(200, 180, 160, 0.1);
            --shadow-color: rgba(0,0,0,0.4);
            --nav-bg: rgba(26, 20, 16, 0.92);
            --footer-bg: #0d0a08;
            --footer-text: #f5ede8;
            --input-bg: #2a1f18;
            --input-border: #3d2d22;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }

        .dashboard-nav {
            background: var(--bg-card);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
        }

        .dashboard-nav .nav-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .dashboard-nav .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .dashboard-nav .logo svg {
            width: 35px;
            height: 35px;
        }

        .dashboard-nav .logo span {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-nav .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .dashboard-nav .nav-right .user-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .theme-toggle, .lang-toggle {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .theme-toggle:hover, .lang-toggle:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .theme-toggle svg, .lang-toggle svg {
            width: 16px;
            height: 16px;
        }

        .logout-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold-dark);
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: var(--gold);
            color: white;
        }

        .dashboard-main {
            padding: 2rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
            transition: var(--transition);
        }

        .dashboard-header {
            margin-bottom: 2.5rem;
        }

        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .dashboard-header p {
            color: var(--text-secondary);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
        }

        .dashboard-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px var(--shadow-color);
        }

        .dashboard-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition);
        }

        .dashboard-card h3 svg {
            width: 24px;
            height: 24px;
            color: var(--gold);
        }

        .dashboard-card .form-group {
            margin-bottom: 1rem;
        }

        .dashboard-card .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 6
00;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            transition: var(--transition);
        }

        .dashboard-card .form-group input,
        .dashboard-card .form-group textarea,
        .dashboard-card .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .dashboard-card .form-group input:focus,
        .dashboard-card .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .dashboard-card .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 169, 110, 0.3);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c0392b;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold-dark);
        }

        .btn-outline:hover:not(:disabled) {
            background: var(--gold);
            color: white;
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .item-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .item-list .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .item-list .item:last-child {
            border-bottom: none;
        }

        .item-list .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .status-msg {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
            transition: var(--transition);
        }

        .status-msg.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        [data-theme="dark"] .status-msg.success {
            background: #1a3a2a;
            color: #8fdfb0;
            border-color: #2a5a3a;
        }

        .status-msg.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        [data-theme="dark"] .status-msg.error {
            background: #3a1a1a;
            color: #df8f8f;
            border-color: #5a2a2a;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition);
            border-radius: 2px;
        }

        .file-info {
            font-size: 0.75rem;
            color: var(--text-gold);
            margin-top: 0.25rem;
        }

        /* Loading spinner and progress bar */
        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            display: none;
            width: 100%;
            margin-top: 1rem;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-dark));
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            text-align: center;
        }

        .upload-success {
            animation: successPulse 0.5s ease;
        }

        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .dashboard-nav .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 0.5rem;
                padding: 1rem 0;
            }

            .dashboard-nav .nav-links.active {
                display: flex;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-nav {
                flex-wrap: wrap;
            }

            .dashboard-nav .nav-right {
                width: 100%;
                justify-content: flex-end;
            }

            .dashboard-nav .nav-left {
                width: 100%;
                justify-content: space-between;
            }
        }

        [dir="rtl"] .item-list .item {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .item-list .item-actions {
            flex-direction: row-reverse;
        }

        /* Scrollbar styling */
        .item-list::-webkit-scrollbar {
            width: 6px;
        }

        .item-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 10px;
        }

        .item-list::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .item-list::-webkit-scrollbar-thumb:hover {
            background: var(--gold-dark);
        }
    </style>
</head>
<body>
    <nav class="dashboard-nav" id="dashboardNav">
        <div class="nav-left">
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <a href="/" class="logo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="#C9A96E" stroke-width="2"/>
                    <text x="50" y="58" text-anchor="middle" font-family="Playfair Display, serif" font-size="28" fill="#C9A96E" font-weight="700">✝</text>
                    <text x="50" y="78" text-anchor="middle" font-family="Playfair Display, serif" font-size="8" fill="#A67C52" font-weight="400">BAPTISM</text>
                </svg>
                <span data-i18n="dashboard.brand">Baptism Blessing</span>
            </a>
        </div>
        <div class="nav-links" id="navLinks">
            <span class="user-info" id="userDisplay" data-i18n="dashboard.welcome">Welcome, Admin</span>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <span id="themeLabel">Light</span>
            </button>
            <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span id="langLabel">EN</span>
            </button>
            <button class="logout-btn" id="logoutBtn" data-i18n="dashboard.logout">Logout</button>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="dashboard-header">
            <h1 data-i18n="dashboard.title">Welcome to Baptism Blessing Dashboard</h1>
            <p data-i18n="dashboard.subtitle">Manage your invitation website content</p>
        </div>

        <div id="statusMessage" class="status-msg"></div>

        <div class="dashboard-grid">
            <!-- Gallery Management -->
            <div class="dashboard-card">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span data-i18n="dashboard.galleryManagement">Gallery Management</span>
                </h3>
                <form id="galleryForm">
                    <div class="form-group">
                        <label data-i18n="dashboard.uploadImage">Upload Image</label>
                        <div class="file-input-wrapper">
                            <button class="btn btn-outline btn-sm" data-i18n="dashboard.chooseImage">Choose Image</button>
                            <input type="file" id="galleryFile" accept="image/*" required>
                        </div>
                        <span id="galleryFileName" style="font-size: 0.8rem; color: var(--text-secondary); margin-left: 0.5rem; transition: var(--transition);"></span>
                    </div>
                    <button type="submit" class="btn btn-primary" id="galleryUploadBtn" data-i18n="dashboard.upload">Upload Image</button>
                    <div class="progress-container" id="galleryProgress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="galleryProgressFill"></div>
                        </div>
                        <div class="progress-text" id="galleryProgressText">Uploading...</div>
                    </div>
                </form>
                <div style="margin-top: 1rem;">
                    <h4 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; transition: var(--transition);" data-i18n="dashboard.currentGallery">Current Gallery</h4>
                    <div class="item-list" id="galleryList">
                    </div>
                </div>
            </div>

            <!-- Video Management -->
            <div class="dashboard-card">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                    <span data-i18n="dashboard.videoManagement">Video Management</span>
                </h3>
                <form id="videoForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label data-i18n="dashboard.videoFile">Upload Video</label>
                        <input type="file" id="videoFile" accept="video/*" required>
                        <div class="file-info" id="videoFileInfo">Choose a video file (max 50MB)</div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="dashboard.videoTitle">Title</label>
                        <input type="text" id="videoTitle" data-i18n-placeholder="dashboard.videoTitlePlaceholder" placeholder="Video title">
                    </div>
                    <div class="form-group">
                        <label data-i18n="dashboard.videoDesc">Description</label>
                        <input type="text" id="videoDesc" data-i18n-placeholder="dashboard.videoDescPlaceholder" placeholder="Brief description">
                    </div>
                    <button type="submit" class="btn btn-primary" id="videoUploadBtn" data-i18n="dashboard.uploadVideo">Upload Video</button>
                    <div class="progress-container" id="videoProgress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="videoProgressFill"></div>
                        </div>
                        <div class="progress-text" id="videoProgressText">Uploading...</div>
                    </div>
                </form>
                <div style="margin-top: 1rem;">
                    <h4 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; transition: var(--transition);" data-i18n="dashboard.currentVideos">Current Videos</h4>
                    <div class="item-list" id="videoList">
                    </div>
                </div>
            </div>

            <!-- Tools -->
            <div class="dashboard-card">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="3" y1="15" x2="21" y2="15"/>
                        <line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                    <span data-i18n="dashboard.tools">Tools</span>
                </h3>
                <div class="btn-group" style="margin-bottom: 1rem;">
                    <button class="btn btn-primary" id="generateQRBtn" data-i18n="dashboard.generateQR">Generate QR Code</button>
                    <button class="btn btn-outline" id="copyLinkBtn" data-i18n="dashboard.copyLink">Copy Invitation Link</button>
                </div>
                <div id="qrContainer" style="text-align: center; margin-top: 1rem; display: none;">
                    <img id="qrCode" src="" alt="QR Code" style="max-width: 200px; border-radius: 12px; box-shadow: var(--shadow); width: 100%; height: auto;">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; transition: var(--transition);" data-i18n="dashboard.scanQR">Scan to view the invitation</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Language translations
        const translations = {
            en: {
                'dashboard.brand': 'Baptism Blessing',
                'dashboard.welcome': 'Welcome, Admin',
                'dashboard.logout': 'Logout',
                'dashboard.title': 'Welcome to Baptism Blessing Dashboard',
                'dashboard.subtitle': 'Manage your invitation website content',
                'dashboard.galleryManagement': 'Gallery Management',
                'dashboard.uploadImage': 'Upload Image',
                'dashboard.chooseImage': 'Choose Image',
                'dashboard.upload': 'Upload Image',
                'dashboard.currentGallery': 'Current Gallery',
                'dashboard.videoManagement': 'Video Management',
                'dashboard.videoFile': 'Upload Video',
                'dashboard.videoTitle': 'Title',
                'dashboard.videoTitlePlaceholder': 'Video title',
                'dashboard.videoDesc': 'Description',
                'dashboard.videoDescPlaceholder': 'Brief description',
                'dashboard.uploadVideo': 'Upload Video',
                'dashboard.currentVideos': 'Current Videos',
                'dashboard.tools': 'Tools',
                'dashboard.generateQR': 'Generate QR Code',
                'dashboard.copyLink': 'Copy Invitation Link',
                'dashboard.scanQR': 'Scan to view the invitation',
                'dashboard.delete': 'Delete',
                'dashboard.image': 'Image',
                'dashboard.video': 'Video'
            },
            ar: {
                'dashboard.brand': 'معمودية البركة',
                'dashboard.welcome': 'مرحباً، المدير',
                'dashboard.logout': 'تسجيل الخروج',
                'dashboard.title': 'مرحباً بكم في لوحة تحكم معمودية البركة',
                'dashboard.subtitle': 'إدارة محتوى موقع دعوتكم',
                'dashboard.galleryManagement': 'إدارة المعرض',
                'dashboard.uploadImage': 'رفع صورة',
                'dashboard.chooseImage': 'اختر صورة',
                'dashboard.upload': 'رفع الصورة',
                'dashboard.currentGallery': 'المعرض الحالي',
                'dashboard.videoManagement': 'إدارة الفيديوهات',
                'dashboard.videoFile': 'رفع فيديو',
                'dashboard.videoTitle': 'العنوان',
                'dashboard.videoTitlePlaceholder': 'عنوان الفيديو',
                'dashboard.videoDesc': 'الوصف',
                'dashboard.videoDescPlaceholder': 'وصف مختصر',
                'dashboard.uploadVideo': 'رفع الفيديو',
                'dashboard.currentVideos': 'الفيديوهات الحالية',
                'dashboard.tools': 'الأدوات',
                'dashboard.generateQR': 'إنشاء رمز QR',
                'dashboard.copyLink': 'نسخ رابط الدعوة',
                'dashboard.scanQR': 'امسح لعرض الدعوة',
                'dashboard.delete': 'حذف',
                'dashboard.image': 'صورة',
                'dashboard.video': 'فيديو'
            }
        };

        let currentLang = 'en';
        let currentTheme = 'light';
        let token = null;

        // Theme management
        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
            localStorage.setItem('theme', theme);
            const label = document.getElementById('themeLabel');
            label.textContent = theme === 'dark' ? 'Dark' : 'Light';
            const btn = document.getElementById('themeToggle');
            if (theme === 'dark') {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <span id="themeLabel">Dark</span>
                `;
            } else {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <span id="themeLabel">Light</span>
                `;
            }
        }

        // Language management
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langLabel').textContent = lang === 'ar' ? 'AR' : 'EN';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang] && translations[lang][key]) {
                    el.placeholder = translations[lang][key];
                }
            });
        }

        // Toggle theme
        document.getElementById('themeToggle').addEventListener('click', function() {
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });

        // Toggle language
        document.getElementById('langToggle').addEventListener('click', function() {
            setLanguage(currentLang === 'en' ? 'ar' : 'en');
        });

        // Load saved preferences
        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedLang = localStorage.getItem('language') || 'en';
        setTheme(savedTheme);
        setLanguage(savedLang);

        // Get token
        function getToken() {
            return localStorage.getItem('token');
        }

        token = getToken();
        if (!token) {
            window.location.href = '/login';
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });
            } catch (e) {}
            localStorage.removeItem('token');
            localStorage.removeItem('rememberMe');
            window.location.href = '/login';
        });

        // Hamburger menu
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Show status message
        function showStatus(message, type = 'success') {
            const el = document.getElementById('statusMessage');
            el.textContent = message;
            el.className = 'status-msg ' + type;
            setTimeout(() => {
                el.className = 'status-msg';
            }, 5000);
        }

        // Load gallery
        async function loadGallery() {
            try {
                const response = await fetch('/api/gallery', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });
                if (response.ok) {
                    const items = await response.json();
                    const list = document.getElementById('galleryList');
                    list.innerHTML = '';
                    const deleteLabel = currentLang === 'ar' ? 'حذف' : 'Delete';
                    const imageLabel = currentLang === 'ar' ? 'صورة' : 'Image';
                    if (items && items.length > 0) {
                        items.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'item';
                            div.innerHTML = `
                                <div style="display: flex; align-items: center; gap: 1rem;">
                                    <img src="${item.url}" alt="${item.title || imageLabel}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;">
                                    <span style="font-size: 0.9rem;">${item.title || imageLabel}</span>
                                </div>
                                <div class="item-actions">
                                    <button class="btn btn-danger btn-sm delete-gallery" data-id="${item.id}">${deleteLabel}</button>
                                </div>
                            `;
                            list.appendChild(div);
                        });
                        document.querySelectorAll('.delete-gallery').forEach(btn => {
                            btn.addEventListener('click', async function() {
                                const id = this.dataset.id;
                                const confirmMsg = currentLang === 'ar' ? 'حذف هذه الصورة؟' : 'Delete this image?';
                                if (confirm(confirmMsg)) {
                                    try {
                                        const response = await fetch(`/api/gallery/${id}`, {
                                            method: 'DELETE',
                                            headers: {
                                                'Authorization': `Bearer ${token}`,
                                            },
                                        });
                                        if (response.ok) {
                                            showStatus(currentLang === 'ar' ? 'تم حذف الصورة.' : 'Image deleted.');
                                            loadGallery();
                                        }
                                    } catch (error) {
                                        showStatus(currentLang === 'ar' ? 'خطأ في حذف الصورة.' : 'Error deleting image.', 'error');
                                    }
                                }
                            });
                        });
                    } else {
                        list.innerHTML = `<div style="text-align: center; padding: 1rem; color: var(--text-secondary);">${currentLang === 'ar' ? 'لا توجد صور' : 'No images'}</div>`;
                    }
                }
            } catch (error) {
                console.error('Error loading gallery:', error);
            }
        }

        loadGallery();

        // Upload gallery image with loading
        document.getElementById('galleryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('galleryFile');
            const file = fileInput.files[0];
            const btn = document.getElementById('galleryUploadBtn');
            const progressContainer = document.getElementById('galleryProgress');
            const progressFill = document.getElementById('galleryProgressFill');
            const progressText = document.getElementById('galleryProgressText');

            if (!file) {
                showStatus(currentLang === 'ar' ? 'يرجى اختيار صورة.' : 'Please select an image.', 'error');
                return;
            }

            // Disable button and show loading
            btn.disabled = true;
            btn.classList.add('btn-loading');
            progressContainer.classList.add('active');
            progressFill.style.width = '0%';
            progressText.textContent = currentLang === 'ar' ? 'جاري الرفع...' : 'Uploading...';

            const formData = new FormData();
            formData.append('image', file);

            // Simulate progress
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                progressText.textContent = `${Math.round(progress)}%`;
            }, 200);

            try {
                const response = await fetch('/api/gallery', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                    body: formData,
                });

                clearInterval(progressInterval);
                
                if (response.ok) {
                    progressFill.style.width = '100%';
                    progressText.textContent = currentLang === 'ar' ? '✅ تم الرفع بنجاح!' : '✅ Upload complete!';
                    showStatus(currentLang === 'ar' ? 'تم رفع الصورة بنجاح!' : 'Image uploaded successfully!');
                    fileInput.value = '';
                    document.getElementById('galleryFileName').textContent = '';
                    
                    // Success animation
                    btn.classList.remove('btn-loading');
                    btn.classList.add('upload-success');
                    setTimeout(() => btn.classList.remove('upload-success'), 500);
                    
                    setTimeout(() => {
                        progressContainer.classList.remove('active');
                        progressFill.style.width = '0%';
                    }, 1500);
                    
                    loadGallery();
                } else {
                    const error = await response.json();
                    showStatus(error.message || (currentLang === 'ar' ? 'فشل في رفع الصورة.' : 'Failed to upload image.'), 'error');
                    progressContainer.classList.remove('active');
                }
            } catch (error) {
                clearInterval(progressInterval);
                showStatus(currentLang === 'ar' ? 'خطأ في الشبكة. يرجى المحاولة مرة أخرى.' : 'Network error. Please try again.', 'error');
                progressContainer.classList.remove('active');
            } finally {
                btn.disabled = false;
                btn.classList.remove('btn-loading');
            }
        });

        document.getElementById('galleryFile').addEventListener('change', function() {
            const fileName = this.files[0]?.name || '';
            const fileSize = this.files[0]?.size || 0;
            const sizeInMB = (fileSize / (1024 * 1024)).toFixed(2);
            document.getElementById('galleryFileName').textContent = fileName ? `${fileName} (${sizeInMB} MB)` : '';
        });

        // Load videos
        async function loadVideos() {
            try {
                const response = await fetch('/api/videos', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });
                if (response.ok) {
                    const items = await response.json();
                    const list = document.getElementById('videoList');
                    list.innerHTML = '';
                    const deleteLabel = currentLang === 'ar' ? 'حذف' : 'Delete';
                    const videoLabel = currentLang === 'ar' ? 'فيديو' : 'Video';
                    if (items && items.length > 0) {
                        items.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'item';
                            div.innerHTML = `
                                <div style="display: flex; align-items: center; gap: 1rem; flex: 1;">
                                    <div style="width: 80px; height: 60px; background: #000; border-radius: 8px; overflow: hidden; flex-shrink: 0;">
                                        <video style="width: 100%; height: 100%; object-fit: cover;" muted>
                                            <source src="${item.url}" type="video/mp4">
                                        </video>
                                    </div>
                                    <div style="flex: 1;">
                                        <strong style="font-size: 0.9rem;">${item.title || videoLabel}</strong>
                                        <p style="font-size: 0.75rem; color: var(--text-secondary); margin: 0; transition: var(--transition);">${item.description || ''}</p>
                                    </div>
                                </div>
                                <div class="item-actions">
                                    <button class="btn btn-danger btn-sm delete-video" data-id="${item.id}">${deleteLabel}</button>
                                </div>
                            `;
                            list.appendChild(div);
                        });
                        document.querySelectorAll('.delete-video').forEach(btn => {
                            btn.addEventListener('click', async function() {
                                const id = this.dataset.id;
                                const confirmMsg = currentLang === 'ar' ? 'حذف هذا الفيديو؟' : 'Delete this video?';
                                if (confirm(confirmMsg)) {
                                    try {
                                        const response = await fetch(`/api/video/${id}`, {
                                            method: 'DELETE',
                                            headers: {
                                                'Authorization': `Bearer ${token}`,
                                            },
                                        });
                                        if (response.ok) {
                                            showStatus(currentLang === 'ar' ? 'تم حذف الفيديو.' : 'Video deleted.');
                                            loadVideos();
                                        }
                                    } catch (error) {
                                        showStatus(currentLang === 'ar' ? 'خطأ في حذف الفيديو.' : 'Error deleting video.', 'error');
                                    }
                                }
                            });
                        });
                    } else {
                        list.innerHTML = `<div style="text-align: center; padding: 1rem; color: var(--text-secondary);">${currentLang === 'ar' ? 'لا توجد فيديوهات' : 'No videos'}</div>`;
                    }
                }
            } catch (error) {
                console.error('Error loading videos:', error);
            }
        }

        loadVideos();

        // Upload video with loading
        document.getElementById('videoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('videoFile');
            const file = fileInput.files[0];
            const title = document.getElementById('videoTitle').value;
            const description = document.getElementById('videoDesc').value;
            const btn = document.getElementById('videoUploadBtn');
            const progressContainer = document.getElementById('videoProgress');
            const progressFill = document.getElementById('videoProgressFill');
            const progressText = document.getElementById('videoProgressText');

            if (!file) {
                showStatus(currentLang === 'ar' ? 'يرجى اختيار فيديو.' : 'Please select a video.', 'error');
                return;
            }

            // Check file size (50MB max)
            if (file.size > 50 * 1024 * 1024) {
                showStatus(currentLang === 'ar' ? 'حجم الفيديو كبير جداً. الحد الأقصى 50 ميجابايت.' : 'Video file is too large. Maximum size is 50MB.', 'error');
                return;
            }

            // Disable button and show loading
            btn.disabled = true;
            btn.classList.add('btn-loading');
            progressContainer.classList.add('active');
            progressFill.style.width = '0%';
            progressText.textContent = currentLang === 'ar' ? 'جاري الرفع...' : 'Uploading...';

            const formData = new FormData();
            formData.append('video', file);
            formData.append('title', title);
            formData.append('description', description);

            // Simulate progress for large files
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 8;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                progressText.textContent = `${Math.round(progress)}%`;
            }, 300);

            try {
                const response = await fetch('/api/video', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                    body: formData,
                });

                clearInterval(progressInterval);

                if (response.ok) {
                    progressFill.style.width = '100%';
                    progressText.textContent = currentLang === 'ar' ? '✅ تم الرفع بنجاح!' : '✅ Upload complete!';
                    showStatus(currentLang === 'ar' ? 'تم رفع الفيديو بنجاح!' : 'Video uploaded successfully!');
                    fileInput.value = '';
                    document.getElementById('videoTitle').value = '';
                    document.getElementById('videoDesc').value = '';
                    document.getElementById('videoFileInfo').textContent = currentLang === 'ar' ? 'اختر ملف فيديو (حد أقصى 50 ميجابايت)' : 'Choose a video file (max 50MB)';
                    
                    // Success animation
                    btn.classList.remove('btn-loading');
                    btn.classList.add('upload-success');
                    setTimeout(() => btn.classList.remove('upload-success'), 500);
                    
                    setTimeout(() => {
                        progressContainer.classList.remove('active');
                        progressFill.style.width = '0%';
                    }, 1500);
                    
                    loadVideos();
                } else {
                    const error = await response.json();
                    showStatus(error.message || (currentLang === 'ar' ? 'فشل في رفع الفيديو.' : 'Failed to upload video.'), 'error');
                    progressContainer.classList.remove('active');
                }
            } catch (error) {
                clearInterval(progressInterval);
                showStatus(currentLang === 'ar' ? 'خطأ في الشبكة. يرجى المحاولة مرة أخرى.' : 'Network error. Please try again.', 'error');
                progressContainer.classList.remove('active');
            } finally {
                btn.disabled = false;
                btn.classList.remove('btn-loading');
            }
        });

        document.getElementById('videoFile').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const size = (file.size / (1024 * 1024)).toFixed(2);
                document.getElementById('videoFileInfo').textContent = `${file.name} (${size} MB)`;
                if (file.size > 50 * 1024 * 1024) {
                    document.getElementById('videoFileInfo').style.color = '#e74c3c';
                } else {
                    document.getElementById('videoFileInfo').style.color = 'var(--text-gold)';
                }
            }
        });

        // Generate QR Code
        document.getElementById('generateQRBtn').addEventListener('click', function() {
            const container = document.getElementById('qrContainer');
            const qrImg = document.getElementById('qrCode');
            const url = window.location.origin;
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
            container.style.display = 'block';
        });

        // Copy invitation link
        document.getElementById('copyLinkBtn').addEventListener('click', function() {
            const url = window.location.origin;
            navigator.clipboard.writeText(url).then(() => {
                showStatus(currentLang === 'ar' ? 'تم نسخ رابط الدعوة!' : 'Invitation link copied to clipboard!');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showStatus(currentLang === 'ar' ? 'تم نسخ رابط الدعوة!' : 'Invitation link copied to clipboard!');
            });
        });

        // Reload data every 5 seconds to keep in sync
        setInterval(() => {
            loadGallery();
            loadVideos();
        }, 5000);

        // Verify token on load
        fetch('/api/gallery', {
            headers: {
                'Authorization': `Bearer ${token}`,
            },
        }).then(response => {
            if (!response.ok) {
                localStorage.removeItem('token');
                window.location.href = '/login';
            }
        }).catch(() => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });
    </script>
</body>
</html>
