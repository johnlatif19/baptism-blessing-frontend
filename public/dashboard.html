<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Blessing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ivory: #FDF8F0;
            --champagne: #F5E6D3;
            --beige: #E8D5C4;
            --blush: #F5D6D6;
            --warm-white: #FFF9F5;
            --gold: #C9A96E;
            --gold-light: #E8D5A3;
            --gold-dark: #B8944A;
            --text-dark: #2C1810;
            --text-gold: #A67C52;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-primary: #FDF8F0;
            --bg-secondary: #FFF9F5;
            --bg-card: #ffffff;
            --text-primary: #2C1810;
            --text-secondary: #A67C52;
            --border-color: rgba(201, 169, 110, 0.1);
            --shadow-color: rgba(0,0,0,0.08);
            --nav-bg: rgba(253, 248, 240, 0.92);
            --footer-bg: #2C1810;
            --footer-text: #FFF9F5;
            --input-bg: #FFF9F5;
            --input-border: #F5E6D3;
            --transition: all 0.4s ease;
        }

        [data-theme="dark"] {
            --ivory: #1a1410;
            --champagne: #2a1f18;
            --beige: #33261e;
            --blush: #2a1a1a;
            --warm-white: #1f1814;
            --text-dark: #f5ede8;
            --text-gold: #d4b896;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glass: rgba(30, 20, 15, 0.6);
            --glass-border: rgba(200, 180, 160, 0.15);
            --bg-primary: #1a1410;
            --bg-secondary: #1f1814;
            --bg-card: #2a1f18;
            --text-primary: #f5ede8;
            --text-secondary: #d4b896;
            --border-color: rgba(200, 180, 160, 0.1);
            --shadow-color: rgba(0,0,0,0.4);
            --nav-bg: rgba(26, 20, 16, 0.92);
            --footer-bg: #0d0a08;
            --footer-text: #f5ede8;
            --input-bg: #2a1f18;
            --input-border: #3d2d22;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }

        .dashboard-nav {
            background: var(--bg-card);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
        }

        .dashboard-nav .nav-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .dashboard-nav .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .dashboard-nav .logo svg {
            width: 35px;
            height: 35px;
        }

        .dashboard-nav .logo span {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-nav .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .dashboard-nav .nav-right .user-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .theme-toggle, .lang-toggle {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .theme-toggle:hover, .lang-toggle:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .theme-toggle svg, .lang-toggle svg {
            width: 16px;
            height: 16px;
        }

        .logout-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold-dark);
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: var(--gold);
            color: white;
        }

        .dashboard-main {
            padding: 2rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
            transition: var(--transition);
        }

        .dashboard-header {
            margin-bottom: 2.5rem;
        }

        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .dashboard-header p {
            color: var(--text-secondary);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
        }

        .dashboard-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px var(--shadow-color);
        }

        .dashboard-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition);
        }

        .dashboard-card h3 svg {
            width: 24px;
            height: 24px;
            color: var(--gold);
        }

        .dashboard-card .form-group {
            margin-bottom: 1rem;
        }

        .dashboard-card .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            transition: var(--transition);
        }

        .dashboard-card .form-group input,
        .dashboard-card .form-group textarea,
        .dashboard-card .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .dashboard-card .form-group input:focus,
        .dashboard-card .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .dashboard-card .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 169, 110, 0.3);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c0392b;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold-dark);
        }

        .btn-outline:hover:not(:disabled) {
            background: var(--gold);
            color: white;
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .item-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .item-list .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .item-list .item:last-child {
            border-bottom: none;
        }

        .item-list .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .status-msg {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
            transition: var(--transition);
        }

        .status-msg.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        [data-theme="dark"] .status-msg.success {
            background: #1a3a2a;
            color: #8fdfb0;
            border-color: #2a5a3a;
        }

        .status-msg.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        [data-theme="dark"] .status-msg.error {
            background: #3a1a1a;
            color: #df8f8f;
            border-color: #5a2a2a;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition);
            border-radius: 2px;
        }

        .file-info {
            font-size: 0.75rem;
            color: var(--text-gold);
            margin-top: 0.25rem;
        }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            display: none;
            width: 100%;
            margin-top: 1rem;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-dark));
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            text-align: center;
        }

        .upload-success {
            animation: successPulse 0.5s ease;
        }

        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .cloudinary-btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
        }

        .file-list {
            margin-top: 0.5rem;
        }

        .file-list .file-item {
            display: inline-block;
            background: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 0.2rem;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .selected-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }

        .progress-container.multi {
            margin-top: 0.5rem;
        }

        .upload-status-item {
            font-size: 0.75rem;
            padding: 0.2rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-status-item .status-icon {
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .dashboard-nav .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 0.5rem;
                padding: 1rem 0;
            }

            .dashboard-nav .nav-links.active {
                display: flex;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-nav {
                flex-wrap: wrap;
            }

            .dashboard-nav .nav-right {
                width: 100%;
                justify-content: flex-end;
            }

            .dashboard-nav .nav-left {
                width: 100%;
                justify-content: space-between;
            }
        }

        [dir="rtl"] .item-list .item {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .item-list .item-actions {
            flex-direction: row-reverse;
        }

        .item-list::-webkit-scrollbar {
            width: 6px;
        }

        .item-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 10px;
        }

        .item-list::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .item-list::-webkit-scrollbar-thumb:hover {
            background: var(--gold-dark);
        }
    </style>
</head>
<body>
    <nav class="dashboard-nav" id="dashboardNav">
        <div class="nav-left">
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <a href="/" class="logo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="#C9A96E" stroke-width="2"/>
                    <text x="50" y="58" text-anchor="middle" font-family="Playfair Display, serif" font-size="28" fill="#C9A96E" font-weight="700">✝</text>
                    <text x="50" y="78" text-anchor="middle" font-family="Playfair Display, serif" font-size="8" fill="#A67C52" font-weight="400">BAPTISM</text>
                </svg>
                <span data-i18n="dashboard.brand">Baptism Blessing</span>
            </a>
        </div>
        <div class="nav-links" id="navLinks">
            <span class="user-info" id="userDisplay" data-i18n="dashboard.welcome">Welcome, Admin</span>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <span id="themeLabel">Light</span>
            </button>
            <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span id="langLabel">EN</span>
            </button>
            <button class="logout-btn" id="logoutBtn" data-i18n="dashboard.logout">Logout</button>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="dashboard-header">
            <h1 data-i18n="dashboard.title">Welcome to Baptism Blessing Dashboard</h1>
            <p data-i18n="dashboard.subtitle">Manage your invitation website content</p>
        </div>

        <div id="statusMessage" class="status-msg"></div>

        <div class="dashboard-grid">
            <!-- Gallery Management -->
            <div class="dashboard-card">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span data-i18n="dashboard.galleryManagement">Gallery Management</span>
                </h3>
                <form id="galleryForm">
                    <div class="form-group">
                        <label data-i18n="dashboard.uploadImages">Upload Images</label>
                        <div class="file-input-wrapper">
                            <button class="btn btn-outline btn-sm" data-i18n="dashboard.chooseImages">Choose Images</button>
                            <input type="file" id="galleryFile" accept="image/*" multiple required>
                        </div>
                        <div class="file-list" id="galleryFileList"></div>
                        <div class="selected-count" id="galleryFileCount"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="galleryUploadBtn" data-i18n="dashboard.uploadImagesBtn">Upload All Images</button>
                    <div class="progress-container multi" id="galleryProgress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="galleryProgressFill"></div>
                        </div>
                        <div class="progress-text" id="galleryProgressText">Uploading...</div>
                        <div id="galleryUploadStatus"></div>
                    </div>
                </form>
                <div style="margin-top: 1rem;">
                    <h4 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; transition: var(--transition);" data-i18n="dashboard.currentGallery">Current Gallery</h4>
                    <div class="item-list" id="galleryList">
                    </div>
                </div>
            </div>

            <!-- Video Management -->
            <div class="dashboard-card">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                    <span data-i18n="dashboard.videoManagement">Video Management</span>
                </h3>
                <form id="videoForm">
                    <div class="form-group">
                        <label data-i18n="dashboard.videoFiles">Upload Videos</label>
                        <button type="button" class="btn btn-primary cloudinary-btn" id="cloudinaryUploadBtn">📤 Choose Videos</button>
                        <div class="file-info" id="videoFileInfo" data-i18n="dashboard.videoFileInfo">Click to upload multiple videos (max 500MB each)</div>
                    </div>
                    <div id="videoUploadList"></div>
                    <div id="uploadStatus" style="margin-top: 0.5rem; display: none; color: var(--gold-dark); font-weight: 600; text-align: center;"></div>
                    <div class="progress-container multi" id="videoProgress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="videoProgressFill"></div>
                        </div>
                        <div class="progress-text" id="videoProgressText">Uploading...</div>
                        <div id="videoUploadStatus"></div>
                    </div>
                </form>
                <div style="margin-top: 1rem;">
                    <h4 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; transition: var(--transition);" data-i18n="dashboard.currentVideos">Current Videos</h4>
                    <div class="item-list" id="videoList">
                    </div>
                </div>
            </div>

            <!-- Tools -->
            <div class="dashboard-card">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="3" y1="15" x2="21" y2="15"/>
                        <line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                    <span data-i18n="dashboard.tools">Tools</span>
                </h3>
                <div class="btn-group" style="margin-bottom: 1rem;">
                    <button class="btn btn-primary" id="generateQRBtn" data-i18n="dashboard.generateQR">Generate QR Code</button>
                    <button class="btn btn-outline" id="copyLinkBtn" data-i18n="dashboard.copyLink">Copy Invitation Link</button>
                </div>
                <div id="qrContainer" style="text-align: center; margin-top: 1rem; display: none;">
                    <img id="qrCode" src="" alt="QR Code" style="max-width: 200px; border-radius: 12px; box-shadow: var(--shadow); width: 100%; height: auto;">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; transition: var(--transition);" data-i18n="dashboard.scanQR">Scan to view the invitation</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==================== CONFIGURATION ====================
        const API_URL = 'https://baptism-blessing-backend.up.railway.app';
        // =====================================================

        // Language translations
        const translations = {

            fileList.innerHTML = '';
            for (let i = 0; i < files.length; i++) {

                span.className = 'file-item';
                span.textContent = files[i].name;
                fileList.appendChild(span);

            const imgLabel = currentLang === 'ar' ? 'صورة' : 'image';

        // Upload multiple images - النسخة المعدلة
        document.getElementById('galleryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('galleryFile');
            const files = fileInput.files;
            
            if (files.length === 0) {
                showStatus(currentLang === 'ar' ? 'يرجى اختيار صور.' : 'Please select images.', 'error');
                return;
            }

            const btn = document.getElementById('galleryUploadBtn');
            const progressContainer = document.getElementById('galleryProgress');
            const progressFill = document.getElementById('galleryProgressFill');
            const progressText = document.getElementById('galleryProgressText');
            const statusContainer = document.getElementById('galleryUploadStatus');

            btn.disabled = true;
            btn.classList.add('btn-loading');
            progressContainer.classList.add('active');
            progressFill.style.width = '0%';
            statusContainer.innerHTML = '';

            let uploaded = 0;
            let failed = 0;
            const total = files.length;

            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('image', files[i]);

                // Update progress
                const progress = ((i) / total) * 100;
                progressFill.style.width = progress + '%';
                const progressMsg = currentLang === 'ar' 
                    ? `جاري رفع ${i+1} من ${total}`
                    : `Uploading ${i+1} of ${total}`;
                progressText.textContent = progressMsg;

                const statusItem = document.createElement('div');
                statusItem.className = 'upload-status-item';
                statusItem.id = `gallery-status-${i}`;
                statusItem.innerHTML = `<span>${files[i].name}</span> <span class="status-icon">⏳</span>`;
                statusContainer.appendChild(statusItem);

                try {
                    const token = localStorage.getItem('token');
                    
                    console.log(`📤 Uploading: ${files[i].name}, Size: ${(files[i].size / 1024).toFixed(2)} KB`);
                    
                    const response = await fetch(`${API_URL}/api/gallery`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                        },
                        body: formData,
                    });

                    const statusEl = document.getElementById(`gallery-status-${i}`);
                    
                    let responseData;
                    try {
                        responseData = await response.json();
                    } catch (e) {
                        responseData = { message: 'Invalid response from server' };
                    }
                    
                    if (response.ok) {
                        uploaded++;
                        statusEl.innerHTML = `<span>${files[i].name}</span> <span class="status-icon">✅</span>`;
                        console.log(`✅ Upload successful: ${files[i].name}`);
                    } else {
                        failed++;
                        statusEl.innerHTML = `<span>${files[i].name}</span> <span class="status-icon">❌</span>`;
                        console.error(`❌ Upload failed: ${files[i].name}`, response.status, responseData);
                        
                        const errorMsg = responseData.message || responseData.error || `HTTP ${response.status}`;
                        statusEl.title = errorMsg;
                        
                        if (response.status === 401 || response.status === 403) {
                            showStatus(currentLang === 'ar' ? 'انتهت صلاحية الجلسة. يرجى تسجيل الدخول مرة أخرى.' : 'Session expired. Please login again.', 'error');
                            setTimeout(() => {
                                localStorage.removeItem('token');
                                window.location.href = '/login';
                            }, 2000);
                            return;
                        }
                    }
                } catch (error) {
                    failed++;
                    console.error(`❌ Network error uploading ${files[i].name}:`, error);
                    const statusEl = document.getElementById(`gallery-status-${i}`);
                    statusEl.innerHTML = `<span>${files[i].name}</span> <span class="status-icon">❌</span>`;
                    statusEl.title = error.message || 'Network error';
                }
            }

            progressFill.style.width = '100%';
            progressText.textContent = currentLang === 'ar' ? '✅ تم الرفع بنجاح!' : '✅ Upload complete!';
            
            const successMsg = currentLang === 'ar' 
                ? `تم رفع ${uploaded} من ${total} صورة بنجاح.${failed > 0 ? ` فشل رفع ${failed} صورة.` : ''}`
                : `Uploaded ${uploaded} of ${total} images successfully.${failed > 0 ? ` Failed to upload ${failed} images.` : ''}`;
            showStatus(successMsg, failed > 0 ? 'error' : 'success');
            
            btn.disabled = false;
            btn.classList.remove('btn-loading');
            
            setTimeout(() => {
                progressContainer.classList.remove('active');
                progressFill.style.width = '0%';
                statusContainer.innerHTML = '';
            }, 5000);

            fileInput.value = '';
            document.getElementById('galleryFileList').innerHTML = '';
            document.getElementById('galleryFileCount').textContent = '';
            
            if (uploaded > 0) {
                loadGallery();
            }
        });

        let videoUploadCount = 0;
        let videoTotalCount = 0;

        async function saveVideoToDatabase(url, publicId, title, description) {
            const progressContainer = document.getElementById('videoProgress');
            const progressFill = document.getElementById('videoProgressFill');
            const progressText = document.getElementById('videoProgressText');
            const status = document.getElementById('uploadStatus');
            const statusContainer = document.getElementById('videoUploadList');
            
            progressContainer.classList.add('active');
            status.style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/api/video`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        url, 
                        publicId, 
                        title: title || 'Video', 
                        description: description || '' 
                    })
                });
                
                videoUploadCount++;
                const progress = Math.min((videoUploadCount / videoTotalCount) * 100, 100);
                progressFill.style.width = progress + '%';
                progressText.textContent = currentLang === 'ar' 
                    ? `جاري رفع ${videoUploadCount} من ${videoTotalCount}`
                    : `Uploading ${videoUploadCount} of ${videoTotalCount}`;
                
                const items = statusContainer.querySelectorAll('.upload-status-item');
                const lastItem = items[items.length - 1];
                if (lastItem) {
                    const icon = lastItem.querySelector('.status-icon');
                    if (response.ok) {
                        icon.textContent = '✅';
                        status.textContent = currentLang === 'ar' ? 'تم رفع الفيديو بنجاح!' : 'Video uploaded successfully!';
                        status.style.color = '#28a745';
                    } else {
                        icon.textContent = '❌';
                        status.textContent = currentLang === 'ar' ? 'فشل في رفع الفيديو.' : 'Failed to upload video.';
                        status.style.color = '#e74c3c';
                    }
                }
                
                if (response.ok) {
                    showStatus(currentLang === 'ar' ? 'تم رفع الفيديو بنجاح!' : 'Video uploaded successfully!');
                    loadVideos();
                } else {
                    const error = await response.json();
                    showStatus(error.message || (currentLang === 'ar' ? 'فشل في حفظ الفيديو.' : 'Failed to save video.'), 'error');
                }
            } catch (error) {
                showStatus(currentLang === 'ar' ? 'خطأ في الشبكة.' : 'Network error.', 'error');
                const items = statusContainer.querySelectorAll('.upload-status-item');
                const lastItem = items[items.length - 1];
                if (lastItem) {
                    lastItem.querySelector('.status-icon').textContent = '❌';
                }
            }
            
            if (videoUploadCount >= videoTotalCount) {
                progressFill.style.width = '100%';
                progressText.textContent = currentLang === 'ar' ? '✅ تم رفع جميع الفيديوهات!' : '✅ All videos uploaded!';
                setTimeout(() => {
                    progressContainer.classList.remove('active');
                    progressFill.style.width = '0%';
                    status.style.display = 'none';
                    videoUploadCount = 0;
                    videoTotalCount = 0;
                    statusContainer.innerHTML = '';
                }, 3000);
            }
        }

                const input = document.createElement('input');

                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showStatus(currentLang === 'ar' ? 'تم نسخ رابط الدعوة!' : 'Invitation link copied to clipboard!');
            });
        });

        // Reload data every 10 seconds
        setInterval(() => {
            loadGallery();
            loadVideos();
        }, 10000);

        // Verify token on load
        fetch(`${API_URL}/api/gallery`, {
            headers: {
                'Authorization': `Bearer ${token}`,
            },
        }).then(response => {
            if (!response.ok) {
                localStorage.removeItem('token');
                window.location.href = '/login';
            }
        }).catch(() => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });
    </script>
</body>
</html>
