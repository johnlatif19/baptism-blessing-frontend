<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Blessing Log in</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ivory: #FDF8F0;
            --champagne: #F5E6D3;
            --beige: #E8D5C4;
            --blush: #F5D6D6;
            --warm-white: #FFF9F5;
            --gold: #C9A96E;
            --gold-light: #E8D5A3;
            --gold-dark: #B8944A;
            --text-dark: #2C1810;
            --text-gold: #A67C52;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-primary: #FDF8F0;
            --bg-secondary: #FFF9F5;
            --bg-card: #ffffff;
            --text-primary: #2C1810;
            --text-secondary: #A67C52;
            --border-color: rgba(201, 169, 110, 0.1);
            --shadow-color: rgba(0,0,0,0.08);
            --nav-bg: rgba(253, 248, 240, 0.92);
            --footer-bg: #2C1810;
            --footer-text: #FFF9F5;
            --input-bg: #FFF9F5;
            --input-border: #F5E6D3;
            --transition: all 0.4s ease;
        }

        [data-theme="dark"] {
            --ivory: #1a1410;
            --champagne: #2a1f18;
            --beige: #33261e;
            --blush: #2a1a1a;
            --warm-white: #1f1814;
            --text-dark: #f5ede8;
            --text-gold: #d4b896;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glass: rgba(30, 20, 15, 0.6);
            --glass-border: rgba(200, 180, 160, 0.15);
            --bg-primary: #1a1410;
            --bg-secondary: #1f1814;
            --bg-card: #2a1f18;
            --text-primary: #f5ede8;
            --text-secondary: #d4b896;
            --border-color: rgba(200, 180, 160, 0.1);
            --shadow-color: rgba(0,0,0,0.4);
            --nav-bg: rgba(26, 20, 16, 0.92);
            --footer-bg: #0d0a08;
            --footer-text: #f5ede8;
            --input-bg: #2a1f18;
            --input-border: #3d2d22;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            animation: fadeIn 0.6s ease;
            margin: 2rem auto;
            transition: var(--transition);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo svg {
            width: 70px;
            height: 70px;
            margin-bottom: 0.5rem;
        }

        .login-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo p {
            color: var(--text-secondary);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            transition: var(--transition);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 2px solid var(--input-border);
            border-radius: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition);
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.15);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .form-options input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--gold);
        }

        .form-options a {
            color: var(--gold-dark);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .form-options a:hover {
            color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.4);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-error {
            color: #e74c3c;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .login-footer a {
            color: var(--gold-dark);
            text-decoration: none;
            font-weight: 600;
        }

        .login-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .login-controls .theme-toggle,
        .login-controls .lang-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-controls .theme-toggle:hover,
        .login-controls .lang-toggle:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .login-controls .theme-toggle svg,
        .login-controls .lang-toggle svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            .form-options {
                flex-direction: column;
                gap: 0.75rem;
                align-items: flex-start;
            }

            .login-controls {
                flex-wrap: wrap;
            }
        }

        [dir="rtl"] .form-options {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .form-options label {
            flex-direction: row-reverse;
        }

        @media (max-width: 480px) {
            [dir="rtl"] .form-options {
                flex-direction: column;
                align-items: flex-end;
            }
        }
.password-wrapper{
    position: relative;
}

.password-wrapper input{
    width:100%;
    padding-right:60px;
}

.toggle-password{
    position:absolute;
    top:50%;
    right:15px;
    transform:translateY(-50%);
    border:none;
    background:none;
    cursor:pointer;
    font-size:18px;
    padding:0;
}

[dir="rtl"] .password-wrapper input{
    padding-right:1.2rem;
    padding-left:60px;
}

[dir="rtl"] .toggle-password{
    right:auto;
    left:15px;
}
    </style>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem;">
        <div class="login-container">
            <div class="login-controls">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <span id="themeLabel">Light</span>
                </button>
                <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span id="langLabel">EN</span>
                </button>
            </div>

            <div class="login-logo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="#C9A96E" stroke-width="2"/>
                    <text x="50" y="58" text-anchor="middle" font-family="Playfair Display, serif" font-size="28" fill="#C9A96E" font-weight="700">✝</text>
                    <text x="50" y="78" text-anchor="middle" font-family="Playfair Display, serif" font-size="8" fill="#A67C52" font-weight="400">BAPTISM</text>
                </svg>
                <h1 data-i18n="login.title">Baptism Blessing Dashboard</h1>
                <p data-i18n="login.subtitle">Sign in to manage your invitation</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" data-i18n="login.username">Username</label>
                    <input type="text" id="username" data-i18n-placeholder="login.usernamePlaceholder" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="login.password">Password</label>
                    <div class="password-wrapper">
                    <input type="password" id="password"
                        data-i18n-placeholder="login.passwordPlaceholder"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword">
                            🐵
                        </button>
                    </div>
                </div>
                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe"> <span data-i18n="login.remember">Remember me</span>
                    </label>
                </div>
                <button type="submit" class="login-btn" data-i18n="login.signin">Sign In</button>
                <div class="login-error" id="loginError" data-i18n="login.error">Invalid username or password. Please try again.</div>
            </form>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        // 👇 غيّر هذا الرابط إلى رابط الـ Backend بتاعك على Railway
        const API_URL = 'https://your-backend.railway.app';
        // لو شغال محلياً استخدم: const API_URL = 'http://localhost:3000';
        // =====================================================

        // Language translations
        const translations = {
            en: {
                'login.title': 'Baptism Blessing Dashboard',
                'login.subtitle': 'Log in to the Dashboard',
                'login.username': 'Username',
                'login.usernamePlaceholder': 'Enter your username',
                'login.password': 'Password',
                'login.passwordPlaceholder': 'Enter your password',
                'login.remember': 'Remember me',
                'login.signin': 'Sign In',
                'login.error': 'Invalid username or password. Please try again.',
            },
            ar: {
                'login.title': 'لوحة تحكم معمودية البركة',
                'login.subtitle': 'تسجيل الدخول للوحة التحكم',
                'login.username': 'اسم المستخدم',
                'login.usernamePlaceholder': 'أدخل اسم المستخدم',
                'login.password': 'كلمة المرور',
                'login.passwordPlaceholder': 'أدخل كلمة المرور',
                'login.remember': 'تذكرني',
                'login.signin': 'تسجيل الدخول',
                'login.error': 'اسم المستخدم أو كلمة المرور غير صحيحة. يرجى المحاولة مرة أخرى.',
            }
        };

        let currentLang = 'en';
        let currentTheme = 'light';

        // Theme management
        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
            localStorage.setItem('theme', theme);
            const label = document.getElementById('themeLabel');
            label.textContent = theme === 'dark' ? 'Dark' : 'Light';
            const btn = document.getElementById('themeToggle');
            if (theme === 'dark') {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <span id="themeLabel">Dark</span>
                `;
            } else {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <span id="themeLabel">Light</span>
                `;
            }
        }

        // Language management
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langLabel').textContent = lang === 'ar' ? 'AR' : 'EN';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang] && translations[lang][key]) {
                    el.placeholder = translations[lang][key];
                }
            });
        }

        // Toggle theme
        document.getElementById('themeToggle').addEventListener('click', function() {
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });

        // Toggle language
        document.getElementById('langToggle').addEventListener('click', function() {
            setLanguage(currentLang === 'en' ? 'ar' : 'en');
        });


        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            this.textContent = isPassword ? '🙈' : '🐵';
            this.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        });

        // Load saved preferences
        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedLang = localStorage.getItem('language') || 'en';
        setTheme(savedTheme);
        setLanguage(savedLang);

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('loginError');

            if (!username || !password) {
                errorDiv.textContent = currentLang === 'ar' ? 'يرجى إدخال اسم المستخدم وكلمة المرور.' : 'Please enter both username and password.';
                errorDiv.classList.add('show');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password, rememberMe }),
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    if (rememberMe) {
                        localStorage.setItem('rememberMe', 'true');
                    }
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = data.message || (currentLang === 'ar' ? 'اسم المستخدم أو كلمة المرور غير صحيحة.' : 'Invalid username or password.');
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = currentLang === 'ar' ? 'خطأ في الشبكة. يرجى المحاولة مرة أخرى.' : 'Network error. Please try again.';
                errorDiv.classList.add('show');
            }
        });

        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            fetch(`${API_URL}/api/gallery`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                },
            }).then(response => {
                if (response.ok) {
                    window.location.href = '/dashboard';
                }
            }).catch(() => {});
        }
    </script>
</body>
</html>
