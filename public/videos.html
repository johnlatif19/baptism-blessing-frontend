<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Blessing | Video Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ivory: #FDF8F0;
            --champagne: #F5E6D3;
            --beige: #E8D5C4;
            --blush: #F5D6D6;
            --warm-white: #FFF9F5;
            --gold: #C9A96E;
            --gold-light: #E8D5A3;
            --gold-dark: #B8944A;
            --marble: #F5F0EB;
            --text-dark: #2C1810;
            --text-gold: #A67C52;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-primary: #FDF8F0;
            --bg-secondary: #FFF9F5;
            --bg-card: #ffffff;
            --text-primary: #2C1810;
            --text-secondary: #A67C52;
            --border-color: rgba(201, 169, 110, 0.1);
            --shadow-color: rgba(0,0,0,0.08);
            --nav-bg: rgba(253, 248, 240, 0.92);
            --footer-bg: #2C1810;
            --footer-text: #FFF9F5;
            --transition: all 0.4s ease;
        }

        [data-theme="dark"] {
            --ivory: #1a1410;
            --champagne: #2a1f18;
            --beige: #33261e;
            --blush: #2a1a1a;
            --warm-white: #1f1814;
            --marble: #1a1410;
            --text-dark: #f5ede8;
            --text-gold: #d4b896;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glass: rgba(30, 20, 15, 0.6);
            --glass-border: rgba(200, 180, 160, 0.15);
            --bg-primary: #1a1410;
            --bg-secondary: #1f1814;
            --bg-card: #2a1f18;
            --text-primary: #f5ede8;
            --text-secondary: #d4b896;
            --border-color: rgba(200, 180, 160, 0.1);
            --shadow-color: rgba(0,0,0,0.4);
            --nav-bg: rgba(26, 20, 16, 0.92);
            --footer-bg: #0d0a08;
            --footer-text: #f5ede8;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            min-height: 100vh;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 5%;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo svg {
            width: 40px;
            height: 40px;
        }

        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle, .lang-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-toggle:hover, .lang-toggle:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .theme-toggle svg, .lang-toggle svg {
            width: 18px;
            height: 18px;
        }

        .back-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold-dark);
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gold);
            color: white;
        }

        .main-content {
            padding: 8rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 3.5vw, 3rem);
            text-align: center;
            margin-bottom: 3rem;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .page-title .gold {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px var(--shadow-color);
        }

        .video-card video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: none;
            display: block;
        }

        .video-card-content {
            padding: 1.5rem;
        }

        .video-card-content h4 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            transition: var(--transition);
        }

        .video-card-content p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .empty-video {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border-radius: 24px;
            border: 2px dashed var(--gold);
            grid-column: 1 / -1;
        }

        .empty-video .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-video h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold-dark);
            margin-bottom: 0.5rem;
        }

        .empty-video p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .footer {
            background: var(--footer-bg);
            color: var(--footer-text);
            padding: 3rem 5%;
            text-align: center;
            margin-top: 2rem;
            transition: var(--transition);
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .footer p {
            opacity: 0.8;
            font-size: 0.95rem;
        }

        .footer .heart {
            color: var(--blush);
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#C9A96E" stroke-width="2"/>
                <text x="50" y="58" text-anchor="middle" font-family="Playfair Display, serif" font-size="28" fill="#C9A96E" font-weight="700">✝</text>
                <text x="50" y="78" text-anchor="middle" font-family="Playfair Display, serif" font-size="8" fill="#A67C52" font-weight="400">BAPTISM</text>
            </svg>
            <span class="nav-logo-text">Baptism Blessing</span>
        </a>
        <div class="nav-controls">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <span id="themeLabel">Light</span>
            </button>
            <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span id="langLabel">EN</span>
            </button>
            <a href="/" class="back-btn">← Back</a>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title"><span data-i18n="video.title">Video</span> <span class="gold" data-i18n="video.gallery">Gallery</span></h1>
        <div class="video-grid" id="videoGrid">
            <!-- Videos will be loaded here -->
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">Baptism Blessing</div>
        <p>Baptism Blessing © 2026</p>
        <p><span data-i18n="footer.made">Made with</span> <span class="heart">❤️</span> <span data-i18n="footer.for">for celebrating God's blessings.</span></p>
    </footer>

    <script>
        // Theme and Language management
        const translations = {
            en: {
                'video.title': 'Video',
                'video.gallery': 'Gallery',
                'video.empty': 'No videos yet',
                'video.emptySub': 'Videos will be added after the baptism ceremony',
                'footer.made': 'Made with',
                'footer.for': 'for celebrating God\'s blessings.'
            },
            ar: {
                'video.title': 'معرض',
                'video.gallery': 'الفيديوهات',
                'video.empty': 'لا توجد فيديوهات بعد',
                'video.emptySub': 'سيتم إضافة الفيديوهات بعد حفل المعمودية',
                'footer.made': 'صنع بـ',
                'footer.for': 'للاحتفال ببركات الله.'
            }
        };

        let currentLang = 'en';
        let currentTheme = 'light';

        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
            localStorage.setItem('theme', theme);
            const label = document.getElementById('themeLabel');
            label.textContent = theme === 'dark' ? 'Dark' : 'Light';
            const btn = document.getElementById('themeToggle');
            if (theme === 'dark') {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <span id="themeLabel">Dark</span>
                `;
            } else {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <span id="themeLabel">Light</span>
                `;
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langLabel').textContent = lang === 'ar' ? 'AR' : 'EN';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });

        document.getElementById('langToggle').addEventListener('click', function() {
            setLanguage(currentLang === 'en' ? 'ar' : 'en');
        });

        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedLang = localStorage.getItem('language') || 'en';
        setTheme(savedTheme);
        setLanguage(savedLang);

        // Load videos
        async function loadVideos() {
            try {
                const response = await fetch('/api/videos');
                if (response.ok) {
                    const videos = await response.json();
                    const grid = document.getElementById('videoGrid');
                    
                    if (videos && videos.length > 0) {
                        grid.innerHTML = '';
                        videos.forEach(video => {
                            const card = document.createElement('div');
                            card.className = 'video-card';
                            
                            const videoEl = document.createElement('video');
                            videoEl.src = video.url;
                            videoEl.title = video.title || 'Video';
                            videoEl.controls = true;
                            videoEl.preload = 'metadata';
                            videoEl.poster = video.poster || '';
                            
                            const content = document.createElement('div');
                            content.className = 'video-card-content';
                            const title = document.createElement('h4');
                            title.textContent = video.title || 'Video';
                            const desc = document.createElement('p');
                            desc.textContent = video.description || '';
                            content.appendChild(title);
                            content.appendChild(desc);
                            card.appendChild(videoEl);
                            card.appendChild(content);
                            grid.appendChild(card);
                        });
                    } else {
                        grid.innerHTML = `
                            <div class="empty-video">
                                <div class="icon">🎬</div>
                                <h3 data-i18n="video.empty">No videos yet</h3>
                                <p data-i18n="video.emptySub">Videos will be added after the baptism ceremony</p>
                            </div>
                        `;
                        document.querySelectorAll('[data-i18n]').forEach(el => {
                            const key = el.getAttribute('data-i18n');
                            if (translations[currentLang] && translations[currentLang][key]) {
                                el.textContent = translations[currentLang][key];
                            }
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading videos:', error);
                const grid = document.getElementById('videoGrid');
                grid.innerHTML = `
                    <div class="empty-video">
                        <div class="icon">🎬</div>
                        <h3 data-i18n="video.empty">No videos yet</h3>
                        <p data-i18n="video.emptySub">Videos will be added after the baptism ceremony</p>
                    </div>
                `;
            }
        }

        loadVideos();

        // Reload every 5 seconds
        setInterval(loadVideos, 5000);
    </script>
</body>
</html>
